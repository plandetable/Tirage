<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Atarah 👑</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #fde2ec, #f8cdda);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* ✨ particules */
.sparkle {
  position: absolute;
  width: 5px;
  height: 5px;
  background: white;
  border-radius: 50%;
  opacity: 0.5;
  animation: float 7s infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 0;}
  50% { opacity: 0.8;}
  100% { transform: translateY(-100vh); opacity: 0;}
}

.container {
  text-align: center;
  padding: 30px;
  z-index: 2;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  color: #c9184a;
}

.subtitle {
  color: #777;
  margin-bottom: 40px;
}

button {
  background: linear-gradient(135deg, #ff8fab, #ff4d6d);
  border: none;
  padding: 15px 35px;
  font-size: 18px;
  color: white;
  border-radius: 50px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 10px 25px rgba(255, 105, 135, 0.4);
}

button:hover {
  transform: scale(1.08);
}

/* 💎 carte */
.card {
  margin-top: 40px;
  padding: 35px;
  border-radius: 25px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
  opacity: 0;
  transform: translateY(30px);
  transition: 0.7s;
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

.word {
  font-size: 26px;
  font-weight: 600;
  color: #c9184a;
  margin-bottom: 10px;
}

.verse {
  font-size: 20px;
  font-style: italic;
  color: #555;
}

.ref {
  margin-top: 10px;
  font-size: 14px;
  color: #999;
}

</style>
</head>

<body>

<!-- ✨ particules -->
<script>
for (let i = 0; i < 25; i++) {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDuration = (Math.random() * 5 + 5) + "s";
  document.body.appendChild(s);
}
</script>

<div class="container">
  <h1>Atarah 👑</h1>
  <div class="subtitle">Prends un instant… puis reçois</div>

  <button onclick="tirer()">✨ Tirer</button>

  <div id="card" class="card">
    <div id="mot" class="word"></div>
    <div id="verset" class="verse"></div>
    <div id="ref" class="ref"></div>
  </div>
</div>

<script>

// 💔 mots + versets
const motsVersets = [
  { mot: "Rejet", verset: "Tu es précieuse à mes yeux", ref: "Ésaïe 43:4" },
  { mot: "Abandon", verset: "Je ne t’abandonnerai jamais", ref: "Hébreux 13:5" },
  { mot: "Peur", verset: "Ne crains rien, je suis avec toi", ref: "Ésaïe 41:10" },
  { mot: "Solitude", verset: "Je suis avec vous tous les jours", ref: "Matthieu 28:20" },
  { mot: "Blessure", verset: "Il guérit ceux qui ont le cœur brisé", ref: "Psaume 147:3" },
  { mot: "Injustice", verset: "L’Éternel combattra pour toi", ref: "Exode 14:14" },
  { mot: "Comparaison", verset: "Tu es merveilleusement créée", ref: "Psaume 139:14" },
  { mot: "Honte", verset: "Il n’y a plus de condamnation", ref: "Romains 8:1" },
  { mot: "Fatigue", verset: "Je vous donnerai du repos", ref: "Matthieu 11:28" },
  { mot: "Doute", verset: "Fortifie-toi et prends courage", ref: "Josué 1:9" }
];

// 📖 versets seuls
const versetsSeuls = [
  { texte: "Tu es précieuse à mes yeux", ref: "Ésaïe 43:4" },
  { texte: "Je suis avec toi", ref: "Ésaïe 41:10" },
  { texte: "Ma grâce te suffit", ref: "2 Corinthiens 12:9" },
  { texte: "Je combats pour toi", ref: "Exode 14:14" },
  { texte: "Je te donne ma paix", ref: "Jean 14:27" },
  { texte: "Tu es mon enfant bien-aimée", ref: "1 Jean 3:1" },
  { texte: "Je restaure ton âme", ref: "Psaume 23:3" }
];

// 👑 noms de Dieu
const noms = [
  { nom: "Jehovah Rapha", sens: "L’Éternel qui me guérit" },
  { nom: "Jehovah Jireh", sens: "L’Éternel qui pourvoit pour moi" },
  { nom: "Jehovah Shalom", sens: "L’Éternel est ma paix" },
  { nom: "Jehovah Nissi", sens: "L’Éternel combat pour moi" },
  { nom: "El-Roï", sens: "Le Dieu qui me voit" },
  { nom: "Emmanuel", sens: "Dieu est avec moi" },
  { nom: "Jehovah Tsidkenu", sens: "L’Éternel est ma justice" },
  { nom: "Jehovah Rohi", sens: "L’Éternel est mon berger" }
];

// 🎲 tirage
function tirer() {

  const random = Math.random();

  let mot = "";
  let verset = "";
  let ref = "";

  if (random < 0.33) {
    // 💔 mot + verset
    const item = motsVersets[Math.floor(Math.random() * motsVersets.length)];
    mot = item.mot;
    verset = item.verset;
    ref = item.ref;

  } else if (random < 0.66) {
    // 📖 verset seul
    const v = versetsSeuls[Math.floor(Math.random() * versetsSeuls.length)];
    mot = "📖 Parole";
    verset = v.texte;
    ref = v.ref;

  } else {
    // 👑 nom de Dieu
    const n = noms[Math.floor(Math.random() * noms.length)];
    mot = n.nom;
    verset = n.sens;
    ref = "Nom de Dieu 👑";
  }

  document.getElementById("mot").innerText = mot;
  document.getElementById("verset").innerText = verset;
  document.getElementById("ref").innerText = ref;

  const card = document.getElementById("card");
  card.classList.remove("show");

  setTimeout(() => {
    card.classList.add("show");
  }, 100);
}

</script>

</body>
</html>

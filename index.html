<!DOCTYPE html>
<html>
<head>
  <title>Tirage de mot</title>
</head>
<body style="text-align:center; font-family:sans-serif; padding-top:50px;">

  <h1>Tire ton mot 🎲</h1>

  <button onclick="tirer()" style="font-size:20px; padding:10px;">
    Tirer un mot
  </button>

  <h2 id="resultat" style="margin-top:30px;"></h2>

  <script>
    const mots = [
      "Espoir",
      "Foi",
      "Amour",
      "Paix",
      "Joie",
      "Patience",
      "Courage",
      "Lumière",
      "Grâce",
      "Vérité"
    ];

    function tirer() {
      const index = Math.floor(Math.random() * mots.length);
      document.getElementById("resultat").innerText = mots[index];
    }
  </script>

</body>
</html>

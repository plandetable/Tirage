<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atarah 👑</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #fde2ec, #f8cdda);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* ✨ particules */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  opacity: 0.5;
  animation: float 7s infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 0;}
  50% { opacity: 0.8;}
  100% { transform: translateY(-100vh); opacity: 0;}
}

/* container */
.container {
  text-align: center;
  padding: 20px;
  width: 100%;
  max-width: 360px;
}

/* titre */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  color: #c9184a;
  margin-bottom: 8px;
}

/* sous-titre */
.subtitle {
  color: #888;
  font-size: 14px;
  margin-bottom: 25px;
}

/* bouton */
button {
  background: linear-gradient(135deg, #ff8fab, #ff4d6d);
  border: none;
  padding: 12px 26px;
  font-size: 16px;
  color: white;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(255, 105, 135, 0.3);
}

/* 💎 carte cachée au début */
.card {
  display: none;
  margin-top: 25px;
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(255,240,245,0.9));
  backdrop-filter: blur(10px);
  box-shadow: 
    0 10px 25px rgba(0,0,0,0.08),
    0 0 20px rgba(255, 182, 193, 0.3);
}

/* ✨ animation apparition */
.card.show {
  display: block;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

/* type */
.type {
  font-size: 12px;
  letter-spacing: 2px;
  color: #bbb;
  margin-bottom: 8px;
}

/* contenu */
.word {
  font-size: 26px;
  font-weight: 600;
  color: #c9184a;
}

.verse {
  margin-top: 10px;
  font-size: 18px;
  font-style: italic;
  color: #555;
  opacity: 0.85;
}

.ref {
  margin-top: 8px;
  font-size: 13px;
  color: #999;
}
</style>
</head>

<body>

<!-- ✨ particules -->
<script>
for (let i = 0; i < 20; i++) {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDuration = (Math.random() * 5 + 5) + "s";
  document.body.appendChild(s);
}
</script>

<div class="container">
  <h1>Atarah 👑</h1>
  <div class="subtitle">Prends un instant… prie… puis laisse Dieu te parler</div>

  <button onclick="tirer()">✨ Tirer</button>

  <div id="card" class="card">
    <div id="type" class="type"></div>
    <div id="mot" class="word"></div>
    <div id="verset" class="verse"></div>
    <div id="ref" class="ref"></div>
  </div>
</div>

<script>

const motsVersets = [
  { mot: "Rejet", verset: "Tu es précieuse à mes yeux", ref: "Ésaïe 43:4" },
  { mot: "Abandon", verset: "Je ne t’abandonnerai jamais", ref: "Hébreux 13:5" },
  { mot: "Peur", verset: "Ne crains rien, je suis avec toi", ref: "Ésaïe 41:10" },
  { mot: "Solitude", verset: "Je suis avec vous tous les jours", ref: "Matthieu 28:20" },
  { mot: "Blessure", verset: "Il guérit ceux qui ont le cœur brisé", ref: "Psaume 147:3" },
  { mot: "Injustice", verset: "L’Éternel combattra pour toi", ref: "Exode 14:14" },
  { mot: "Comparaison", verset: "Tu es merveilleusement créée", ref: "Psaume 139:14" },
  { mot: "Honte", verset: "Il n’y a plus de condamnation", ref: "Romains 8:1" },
  { mot: "Fatigue", verset: "Je vous donnerai du repos", ref: "Matthieu 11:28" },
  { mot: "Doute", verset: "Fortifie-toi et prends courage", ref: "Josué 1:9" }
];

const versetsSeuls = [
  { texte: "Tu es précieuse à mes yeux", ref: "Ésaïe 43:4" },
  { texte: "Je suis avec toi", ref: "Ésaïe 41:10" },
  { texte: "Ma grâce te suffit", ref: "2 Corinthiens 12:9" },
  { texte: "Je combats pour toi", ref: "Exode 14:14" },
  { texte: "Je te donne ma paix", ref: "Jean 14:27" },
  { texte: "Tu es mon enfant bien-aimée", ref: "1 Jean 3:1" },
  { texte: "Je restaure ton âme", ref: "Psaume 23:3" }
];

const noms = [
  { nom: "Jehovah Rapha", sens: "L’Éternel qui me guérit" },
  { nom: "Jehovah Jireh", sens: "L’Éternel qui pourvoit pour moi" },
  { nom: "Jehovah Shalom", sens: "L’Éternel est ma paix" },
  { nom: "Jehovah Nissi", sens: "L’Éternel combat pour moi" },
  { nom: "El-Roï", sens: "Le Dieu qui me voit" },
  { nom: "Emmanuel", sens: "Dieu est avec moi" },
  { nom: "Jehovah Tsidkenu", sens: "L’Éternel est ma justice" },
  { nom: "Jehovah Rohi", sens: "L’Éternel est mon berger" }
];

function tirer() {

  const random = Math.random();

  let mot = "";
  let verset = "";
  let ref = "";
  let type = "";

  if (random < 0.33) {
    const item = motsVersets[Math.floor(Math.random() * motsVersets.length)];
    mot = item.mot;
    verset = item.verset;
    ref = item.ref;
    type = "💗 MOT";

  } else if (random < 0.66) {
    const v = versetsSeuls[Math.floor(Math.random() * versetsSeuls.length)];
    verset = v.texte;
    ref = v.ref;
    type = "📖 VERSET";

  } else {
    const n = noms[Math.floor(Math.random() * noms.length)];
    mot = n.nom;
    verset = n.sens;
    type = "👑 NOM DE DIEU";
  }

  const card = document.getElementById("card");

  document.getElementById("type").innerText = type;
  document.getElementById("mot").innerText = mot;
  document.getElementById("verset").innerText = verset;
  document.getElementById("ref").innerText = ref;

  // ✨ affiche + anime
  card.classList.remove("show");
  setTimeout(() => {
    card.classList.add("show");
  }, 50);
}

</script>

</body>
</html>
